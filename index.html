<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Literacy Lab - Design Selection</title>
    <style>
        :root {
            --oxford-blue: #002147;
            --oxford-gold: #F39200;
            --soft-bg: #f4f7f9;
            --success: #10b981;
            --drive-blue: #4285F4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--soft-bg);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container { max-width: 800px; width: 100%; }

        .card {
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            border-top: 8px solid var(--oxford-blue);
        }

        .header-logo {
            font-weight: bold;
            color: var(--oxford-blue);
            font-size: 1.6rem;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .student-inputs { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 25px; 
        }
        
        input, select, textarea {
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        /* DISEÑO DE OPCIONES (CARDS) */
        .format-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .format-option {
            border: 2px solid #e2e8f0;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            background: #fff;
        }

        .format-option:hover { border-color: var(--oxford-gold); background: #fffcf0; }

        .format-option.selected {
            border-color: var(--oxford-gold);
            background: #fffcf0;
            box-shadow: 0 0 10px rgba(243, 146, 0, 0.2);
        }

        .format-option h4 { margin: 10px 0 5px 0; color: var(--oxford-blue); }
        .format-option p { font-size: 0.75rem; color: #64748b; margin: 0; }
        .icon { font-size: 2rem; }

        .form-section { text-align: left; margin-bottom: 20px; }
        .form-section label { font-weight: bold; color: var(--oxford-blue); display: block; margin-bottom: 8px; }

        button {
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            background: var(--oxford-blue);
            color: white;
        }

        button:disabled { background: #cbd5e1; }

        #successMessage { display: none; padding: 40px; text-align: center; }
        .icon-check { font-size: 5rem; color: var(--success); margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card" id="mainForm">
        <div class="header-logo">LITERACY LAB: FINAL DESIGN</div>
        
        <div class="student-inputs">
            <input type="text" id="studentNames" placeholder="Students' Names (e.g. Mary & John)" style="grid-column: span 2;">
            <input type="text" id="studentClass" placeholder="Class (e.g. 6th B)">
            <input type="text" id="bookTitle" placeholder="Book Title">
        </div>

        <div class="form-section">
            <label>1. Choose your "Superpower" (Format):</label>
            <div class="format-grid">
                <div class="format-option" onclick="selectFormat('Comic', this)">
                    <div class="icon">🎨</div>
                    <h4>Comic Strip</h4>
                    <p>Draw and visualize action</p>
                </div>
                <div class="format-option" onclick="selectFormat('Trailer', this)">
                    <div class="icon">🎬</div>
                    <h4>Movie Trailer</h4>
                    <p>Act, record and edit</p>
                </div>
                <div class="format-option" onclick="selectFormat('Social', this)">
                    <div class="icon">📱</div>
                    <h4>Social Media</h4>
                    <p>Character's digital life</p>
                </div>
                <div class="format-option" onclick="selectFormat('Interview', this)">
                    <div class="icon">🎙️</div>
                    <h4>Roleplay</h4>
                    <p>Dialogue and performance</p>
                </div>
            </div>
        </div>

        <div class="form-section">
            <label>2. The Remix Twist (What are you changing?):</label>
            <select id="twistType">
                <option value="Ending">The Ending</option>
                <option value="Setting">The Setting (Time/Place)</option>
                <option value="Perspective">The Perspective (POV)</option>
            </select>
            <textarea id="twistDescription" placeholder="Describe your creative idea here..." style="margin-top:10px; height: 80px;"></textarea>
        </div>

        <div class="form-section">
            <label>3. Cornell Evidence (One specific detail):</label>
            <input type="text" id="cornellDetail" placeholder="Chapter # and specific detail from your notes">
        </div>

        <button id="submitBtn" onclick="sendData()">🚀 Confirm My Choice</button>
        <div id="status" style="margin-top:15px; font-weight: bold; color: var(--oxford-gold);"></div>
    </div>

    <div class="card" id="successMessage">
        <div class="icon-check">✓</div>
        <h2 style="color: var(--oxford-blue);">CHOICE REGISTERED!</h2>
        <p style="color: #475569;">Your design plan has been sent to the teacher.</p>
        <p id="summaryText" style="background: #f8fafc; padding: 15px; border-radius: 10px; font-size: 0.9rem;"></p>
        <button style="background: var(--oxford-gold); width: auto; padding: 12px 25px;" onclick="location.reload()">New Selection</button>
    </div>
</div>

<script>
    // REEMPLAZA ESTO CON TU URL DE GOOGLE APPS SCRIPT
    const SCRIPT_URL = "TU_URL_DE_GOOGLE_APPS_SCRIPT_AQUI";
    
    let selectedFormat = "";

    function selectFormat(format, element) {
        selectedFormat = format;
        document.querySelectorAll('.format-option').forEach(opt => opt.classList.remove('selected'));
        element.classList.add('selected');
    }

    async function sendData() {
        const data = {
            names: document.getElementById('studentNames').value,
            sClass: document.getElementById('studentClass').value,
            book: document.getElementById('bookTitle').value,
            format: selectedFormat,
            twist: document.getElementById('twistType').value,
            description: document.getElementById('twistDescription').value,
            evidence: document.getElementById('cornellDetail').value
        };

        // Validación básica
        if (!data.names || !data.format || !data.description) {
            alert("Please complete all sections!");
            return;
        }

        const btn = document.getElementById('submitBtn');
        const status = document.getElementById('status');
        
        btn.disabled = true;
        status.textContent = "⌛ Sending plan...";

        try {
            // Enviamos los datos como JSON al Google Apps Script
            await fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(data)
            });

            // Simulamos éxito ya que no-cors no permite leer la respuesta
            setTimeout(() => {
                document.getElementById('mainForm').style.display = 'none';
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('summaryText').innerHTML = `<strong>Project:</strong> ${data.format} - ${data.twist}<br><strong>Students:</strong> ${data.names}`;
            }, 1500);

        } catch (error) {
            alert("Error sending data. Check your connection.");
            btn.disabled = false;
            status.textContent = "";
        }
    }
</script>

</body>
</html>
